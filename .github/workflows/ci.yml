name: Continuous Integration & Deployment (CI/CD)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Type of EAS build to trigger"
        required: true
        type: choice
        default: "development"
        options:
          - "development"
          - "staging"
          - "production"
          - "none"
      platform:
        description: "EAS build platform"
        required: true
        type: choice
        default: "all"
        options:
          - "all"
          - "android"
          - "ios"

jobs:
  # Job 1: Run validations on the Expo project
  expo-ci:
    name: Expo Structure CI
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🧹 Run Lint & Type Checks
        run: npm run lint

      - name: 🧪 Run Unit Tests
        run: npm run test

      - name: 🏥 Run Expo Doctor
        run: npm run doctor

  # Job 2: Trigger EAS cloud builds for Expo
  # To enable this, add EXPO_TOKEN to your GitHub repository Secrets.
  eas-build:
    name: Trigger EAS Build
    needs: [expo-ci]
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type != 'none')
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          patch-watchers: true

      - name: 📦 Install Dependencies
        run: npm ci

      # Android Development Build
      - name: 🚀 Trigger EAS Development Build (Android)
        if: |
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'development' && (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android'))
        run: eas build --platform android --profile development --non-interactive

      # iOS Simulator Development Build
      - name: 🚀 Trigger EAS Development Build (iOS Simulator)
        if: |
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'development' && (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios'))
        run: eas build --platform ios --profile development-simulator --non-interactive

      # Staging Build (Triggered manually via workflow dispatch)
      - name: 🚀 Trigger EAS Staging Build
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'staging')
        run: eas build --platform ${{ github.event.inputs.platform }} --profile staging --non-interactive

      # Production Build (Triggered manually)
      - name: 🚀 Trigger EAS Production Build & Submit
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'production')
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PLATFORM="${{ github.event.inputs.platform }}"
          else
            PLATFORM="all"
          fi
          eas build --platform "$PLATFORM" --profile production --non-interactive --auto-submit
