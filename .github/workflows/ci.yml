name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Type of EAS build to trigger"
        required: true
        type: choice
        default: "development"
        options:
          - "development"
          - "staging"
          - "production"
          - "none"
      platform:
        description: "EAS build platform"
        required: true
        type: choice
        default: "all"
        options:
          - "all"
          - "android"
          - "ios"

jobs:
  # ─── Step 1: Security Scan ────────────────────────────────────────────────
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 TruffleHog Secret Scanner
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ─── Step 2: Expo CI (lint, test, doctor) ────────────────────────────────
  expo-ci:
    name: 🧪 Expo CI
    needs: [security-scan]
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🧹 Lint & Type Checks
        run: npm run lint

      - name: 🧪 Unit Tests
        run: npm test

      - name: 🏥 Expo Doctor
        run: npm run doctor

  # ─── Step 3: Semantic Release (push to main or develop only) ─────────────
  release:
    name: 🏷️ Semantic Release
    needs: [expo-ci]
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🚀 Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  # ─── Step 4: EAS Build (main push or manual dispatch only) ───────────────
  eas-build:
    name: 📦 EAS Build
    needs: [expo-ci]
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type != 'none')
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: ⚙️ Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          patch-watchers: true

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🚀 EAS Development Build (Android)
        if: |
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'development' && (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android'))
        run: eas build --platform android --profile development --non-interactive

      - name: 🚀 EAS Development Build (iOS Simulator)
        if: |
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'development' && (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios'))
        run: eas build --platform ios --profile development-simulator --non-interactive

      - name: 🚀 EAS Staging Build
        if: |
          github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'staging'
        run: eas build --platform ${{ github.event.inputs.platform }} --profile staging --non-interactive

      - name: 🚀 EAS Production Build & Submit
        if: |
          github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'production'
        run: |
          PLATFORM="${{ github.event.inputs.platform }}"
          eas build --platform "$PLATFORM" --profile production --non-interactive --auto-submit
